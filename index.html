<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calculadora Visa Canadá</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: url('fondocanada.jpeg') no-repeat center center fixed;
  background-size: cover;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.95);
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

.logo {
  text-align: center;
  margin-bottom: 15px;
}

.logo img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

h1 {
  text-align: center;
}

.subtitle {
  text-align: center;
  color: #666;
  margin-bottom: 25px;
}

label {
  font-weight: 600;
  display: block;
  margin-top: 15px;
}

select {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  margin-top: 25px;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: black;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.thermometer {
  margin-top: 25px;
}

.bar-bg {
  width: 100%;
  height: 20px;
  background: #eee;
  border-radius: 20px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  width: 0%;
  border-radius: 20px;
  transition: width 1s ease;
}

.low { background: #ff4d4d; }
.mid { background: #ffb84d; }
.high { background: #4CAF50; }

.result-text {
  text-align: center;
  margin-top: 10px;
  font-weight: bold;
}

.cta {
  margin-top: 25px;
  padding: 20px;
  border: 1px solid #ddd;
  border-radius: 12px;
}

.cta a {
  display: block;
  margin-top: 10px;
  padding: 12px;
  text-align: center;
  border-radius: 8px;
  text-decoration: none;
  color: white;
}

.whatsapp { background: #25D366; }
.plan { background: black; }
.clarity { background: #555; }

</style>
</head>

<body>

<div class="container">

<!-- 🔥 LOGO AQUÍ -->
<div class="logo">
  <img src="firma-digital.png" alt="Angelica Potes Canada">
</div>

<h1>¿Te aprobarían la visa de turista a Canadá? 🇨🇦</h1>
<p class="subtitle">Descúbrelo en 2 minutos antes de aplicar</p>

<label>Situación laboral</label>
<select id="job">
<option value="25">Empleado estable</option>
<option value="18">Empleado reciente</option>
<option value="20">Independiente</option>
<option value="15">Estudiante</option>
<option value="5">Desempleado</option>
</select>

<label>Ingresos</label>
<select id="income">
<option value="20">+2000 USD</option>
<option value="15">1000-2000 USD</option>
<option value="10">500-1000 USD</option>
<option value="5">-500 USD</option>
</select>

<label>Ahorros</label>
<select id="savings">
<option value="20">+10000 USD</option>
<option value="15">5000-10000 USD</option>
<option value="10">2000-5000 USD</option>
<option value="5">-2000 USD</option>
</select>

<label>Historial de viajes</label>
<select id="travel">
<option value="15">EEUU / Europa</option>
<option value="10">Otros países</option>
<option value="5">Latam</option>
<option value="2">Ninguno</option>
</select>

<label>Overstay</label>
<select id="overstay">
<option value="10">Nunca</option>
<option value="5">Una vez</option>
<option value="0">Varias veces</option>
</select>

<label>Plan de viaje</label>
<select id="plan">
<option value="15">Definido</option>
<option value="10">Parcial</option>
<option value="5">Ninguno</option>
</select>

<button onclick="calculate()">Calcular mi resultado</button>

<div class="thermometer" id="thermo" style="display:none;">
  <div class="bar-bg">
    <div class="bar-fill" id="bar"></div>
  </div>
  <div class="result-text" id="resultText"></div>
</div>

<div id="cta"></div>

</div>

<script>

function calculate() {
  let score =
    +job.value +
    +income.value +
    +savings.value +
    +travel.value +
    +overstay.value +
    +plan.value;

  score = Math.max(0, Math.min(score, 100));

  let colorClass = "low";
  let text = "";

  if (score >= 70) {
    colorClass = "high";
    text = "Alta probabilidad de aprobación";
  } else if (score >= 50) {
    colorClass = "mid";
    text = "Probabilidad media (puedes mejorar)";
  } else {
    colorClass = "low";
    text = "Alto riesgo de rechazo";
  }

  document.getElementById("thermo").style.display = "block";

  let bar = document.getElementById("bar");
  bar.className = "bar-fill " + colorClass;
  
  setTimeout(() => {
    bar.style.width = score + "%";
  }, 100);

  document.getElementById("resultText").innerHTML =
    `${score}/100 – ${text}`;

  let message = `Hola, hice la calculadora de visa de turista y obtuve ${score}/100. ¿Cómo puedo mejorar mi caso?`;

  document.getElementById("cta").innerHTML = `
    <div class="cta">

      <h3>🚨 Antes de aplicar, hay algo que debes saber</h3>
      <p>La mayoría de personas aplica con errores que pueden llevar a rechazo.</p>
      <p><strong>Tengo algunos tips específicos que pueden ayudarte a mejorar tu score antes de aplicar.</strong></p>

      <a class="whatsapp" href="https://wa.me/14312763929?text=${message}" target="_blank">
        💬 Enviar mi resultado por WhatsApp
      </a>

      <a class="plan" href="https://calendly.com/angelicapotescanada/strategic-consultation-with-angelica-potes" target="_blank">
        🚀 Consulta estratégica (PLAN)
      </a>

      <a class="clarity" href="https://calendly.com/angelicapotescanada/short_consultation" target="_blank">
        ⚡ Consulta corta (CLARIDAD)
      </a>

    </div>
  `;
}

</script>

</body>
</html>
